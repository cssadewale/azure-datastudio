server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Sensible defaults
    sendfile on;
    tcp_nopush on;
    server_tokens off;

    # Gzip everything text-based
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json
               application/wasm image/svg+xml application/manifest+json;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # CSP allows the CDN libs the app needs.
    add_header Content-Security-Policy "default-src 'self'; \
        script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; \
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; \
        font-src 'self' https://fonts.gstatic.com; \
        connect-src 'self' https://cdnjs.cloudflare.com; \
        img-src 'self' data: blob: https:; \
        worker-src 'self' blob:; \
        manifest-src 'self'; \
        object-src 'none'; \
        base-uri 'self'; \
        frame-ancestors 'self';" always;

    # Cache static assets aggressively
    location ~* \.(svg|png|jpg|ico|woff2?|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Do not cache the HTML or service worker
    location = /index.html { add_header Cache-Control "no-cache"; }
    location = /service-worker.js { add_header Cache-Control "no-cache"; }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
